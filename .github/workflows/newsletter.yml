name: Bolet脙颅n Diario Tech Chile

# GitHub Actions no soporta zonas horarias en cron.
# Chile usa UTC-3 (verano, oct-mar) y UTC-4 (invierno, abr-sep).
# Corremos en ambas ventanas UTC y verificamos la hora en el runner.
on:
  schedule:
    - cron: '0 12 * * *'   # 09:00 hora Chile en verano (CLST, UTC-3)
    - cron: '0 13 * * *'   # 09:00 hora Chile en invierno (CLT, UTC-4)
  workflow_dispatch:         # Permite ejecuci脙鲁n manual desde la UI de GitHub

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 芒聰聙芒聰聙 1. Verificar que son las 09:xx en Chile 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Verificar hora Chile (America/Santiago)
        id: hora
        run: |
          python3 - <<'PYEOF'
          from datetime import datetime
          import zoneinfo, os

          now = datetime.now(zoneinfo.ZoneInfo("America/Santiago"))
          print(f"Hora actual en Chile: {now.strftime('%H:%M %Z (%Y-%m-%d)')}")

          output_file = os.environ.get("GITHUB_OUTPUT", "")
          event_name  = os.environ.get("GITHUB_EVENT_NAME", "")

          # Si es ejecuci脙鲁n manual, siempre correr
          if event_name == "workflow_dispatch":
              print("Ejecuci脙鲁n manual 芒聠聮 forzando env脙颅o.")
              val = "true"
          elif now.hour == 9:
              print("芒聹聟 Dentro de la ventana 09:xx 芒聠聮 enviando bolet脙颅n.")
              val = "true"
          else:
              print(f"芒聫颅茂赂聫  Hora {now.hour:02d}:xx fuera de ventana (09:xx). Omitiendo.")
              val = "false"

          if output_file:
              with open(output_file, "a") as f:
                  f.write(f"enviar={val}\n")
          PYEOF

      # 芒聰聙芒聰聙 2. Checkout del repo 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Checkout
        if: steps.hora.outputs.enviar == 'true'
        uses: actions/checkout@v4

      # 芒聰聙芒聰聙 3. Python 3.12 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Configurar Python 3.12
        if: steps.hora.outputs.enviar == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 芒聰聙芒聰聙 4. Dependencias 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Instalar dependencias
        if: steps.hora.outputs.enviar == 'true'
        run: pip install --upgrade pip && pip install -r requirements.txt

      # 芒聰聙芒聰聙 5. Ejecutar el bolet脙颅n 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      - name: Generar y enviar bolet脙颅n
        if: steps.hora.outputs.enviar == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python newsletter.py
