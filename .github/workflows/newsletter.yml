name: Tech Chile Newsletter

# GitHub Actions does not support timezones in cron.
# Chile uses UTC-3 (summer, Oct-Mar) and UTC-4 (winter, Apr-Sep).
# We run at both UTC windows and verify the hour in the runner.
on:
  schedule:
    - cron: '0 12 * * *'   # 09:00 Chile summer time (CLST, UTC-3)
    - cron: '0 13 * * *'   # 09:00 Chile winter time (CLT, UTC-4)
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Verify it is 09:xx in Chile
      - name: Check Chile time (America/Santiago)
        id: hora
        run: |
          python3 - <<'PYEOF'
          from datetime import datetime
          import zoneinfo, os

          now = datetime.now(zoneinfo.ZoneInfo("America/Santiago"))
          print(f"Chile time: {now.strftime('%H:%M %Z (%Y-%m-%d)')}")

          output_file = os.environ.get("GITHUB_OUTPUT", "")
          event_name  = os.environ.get("GITHUB_EVENT_NAME", "")

          # Manual run: always send
          if event_name == "workflow_dispatch":
              print("Manual trigger -> forcing send.")
              val = "true"
          elif now.hour == 9:
              print("Within 09:xx window -> sending newsletter.")
              val = "true"
          else:
              print(f"Hour {now.hour:02d}:xx outside window (09:xx). Skipping.")
              val = "false"

          if output_file:
              with open(output_file, "a") as f:
                  f.write(f"enviar={val}\n")
          PYEOF

      # 2. Checkout
      - name: Checkout
        if: steps.hora.outputs.enviar == 'true'
        uses: actions/checkout@v4

      # 3. Python 3.12
      - name: Set up Python 3.12
        if: steps.hora.outputs.enviar == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 4. Install dependencies
      - name: Install dependencies
        if: steps.hora.outputs.enviar == 'true'
        run: pip install --upgrade pip && pip install -r requirements.txt

      # 5. Run newsletter
      - name: Generate and send newsletter
        if: steps.hora.outputs.enviar == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python newsletter.py
